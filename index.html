<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test en PS3</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding: 50px; }
        .container { border: 2px solid #555; padding: 20px; display: inline-block; }
        img { max-width: 100%; height: auto; border: 1px solid #fff; }
        .status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Prueba de Formato WebP</h2>
    
    <div class="container">
        <p>Si ves la imagen debajo, la PS3 **sí** soporta WebP:</p>
        <img src="test.webp" alt="Error: La imagen no se pudo cargar">
    </div>

    <div class="status">
        <p>Nota: Si ves el texto "Error", el navegador no reconoce el formato.</p>
    </div>

</body>
</html>
